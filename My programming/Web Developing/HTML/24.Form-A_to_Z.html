<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="..//CSS/24.2.From.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form A to Z</title>
</head>
<body>
    <h1>Sign Up Form</h1>
    <hr>
    <form action="#" method="post">
        
        <label for="name" >Name</label>
        <input type="text" id="name" placeholder="Username">
        <br><br>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Usermail">
        <br><br>
        <label for="number">Number</label>
        <select>
            <option value="+880">+880</option>
            <option value="+1">+1</option>
            <option value="+99">+99</option>
        </select>
        <input type="number" id="number" placeholder="123456789" name="number">
        <br><br>
        <label for="country">Country</label>
        <select name="country" id="country">
            <option value="Bangladesh">Bangladesh</option>
            <option value="India">India</option>
            <option value="Pakithan">Pakithan</option>
            <option value="United States" selected>United States</option>
        </select>
        <br><br>
        Gender:  
        <label for="mail">Mail</label>
        <input type="radio" name="gender" id="mail">
        <label for="femail">Femail</label>
        <input type="radio" name="gender" id="femail">
        <br><br>
        <label for="date">Date Of Barth</label>
        <input type="date" name="date" id="date">
        <br><br>
        <label for="time">Time</label>
        <input type="time" name="time" id="time">
        <br><br>
        <label for="color">Color</label>
        <input type="color" name="color" id="color">
        <br><br>
        <label for="file">Choose Photo</label>  
        <input type="file" name="file" id="file">
        <br><br>
        <input type="checkbox" name="box" id="box">
        <label for="box">I like Football</label>
        <input type="checkbox" name="box" id="box1">
        <label for="box1">I like Cricket</label>
        <br><br>
        <textarea name="comment" rows="8" cols="23" placeholder="Comment Here (optional)"></textarea>
        <br><br>
        <input type="submit" value="Send">
        <input type="reset" value="Delete">

    </form>
</body>
</html>
